        // call back function
        function cal(a,b,callback){
        var num1=a;
        console.log("First number is " + num1);
        var num2=b;
        console.log("Second number is "+ num2);
        var res=num1+num2;
        callback(res);

        // callback using set timeout API

        document.writeln("Hello Students");

        //  Javascript Promises: Javascript Promises were created to make asynchronous Javascript easier to use.
        //  Promises Stages.........
        //  Pending - operation started(not finished)
        //  rejected - operations failed
        //  fulfillied->operation completed 
         let promise=new Promise(function(resolve,reject){
             let myAge =23;
            if(myAge>=18){
               resolve("Valid age");
            }
           else{
              reject("wait for next year");
            }
         });
         promise.then(result=>console.log(result)).catch
         (error=>console.log(error));
